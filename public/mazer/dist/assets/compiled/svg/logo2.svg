<svg xmlns="http://www.w3.org/2000/svg" width="300" height="67" viewBox="0 0 300 67">
  <defs>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#39A9FF"></stop>
      <stop offset="1" stop-color="#0B2E9E"></stop>
    </linearGradient>

    <linearGradient id="orangeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFB347"></stop>
      <stop offset="1" stop-color="#FF7A18"></stop>
    </linearGradient>

    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5EDB62"></stop>
      <stop offset="1" stop-color="#2DAA3A"></stop>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1.2" flood-color="#000" flood-opacity="0.15"></feDropShadow>
    </filter>
  </defs>

  <!-- ICON GROUP -->
  <g transform="translate(10,8)" filter="url(#softShadow)">
    <!-- outer swoosh / ring -->
    <path d="M28,2
             C14,5 4,17 4,31
             C4,46 16,58 31,58
             C44,58 55,49 58,37
             C58,52 46,64 31,64
             C12,64 -2,49 -2,31
             C-2,14 10,0 28,2 Z" fill="url(#blueGrad)" opacity="0.95"></path>

    <!-- inner white circle -->
    <circle cx="31" cy="31" r="23" fill="#ffffff"></circle>

    <!-- bottom orange accent arc -->
    <path d="M13,43
             C18,52 24,56 31,56
             C41,56 50,48 52,38
             C48,51 40,59 31,59
             C22,59 15,52 11,45 Z" fill="url(#orangeGrad)" opacity="0.9"></path>

    <!-- People (3 heads + shoulders simplified) -->
    <!-- left person -->
    <circle cx="18" cy="18" r="5" fill="#2FA4FF"></circle>
    <path d="M10,33 C12,25 24,25 26,33" fill="#2FA4FF" opacity="0.95"></path>

    <!-- top person -->
    <circle cx="31" cy="12" r="6" fill="#F6A623"></circle>
    <path d="M20,31 C22,22 40,22 42,31" fill="#F6A623" opacity="0.95"></path>

    <!-- right person -->
    <circle cx="44" cy="18" r="5" fill="#4CD964"></circle>
    <path d="M36,33 C38,25 50,25 52,33" fill="#4CD964" opacity="0.95"></path>

    <!-- Tie inside -->
    <g transform="translate(31,26)">
      <path d="M0,-7 L5,-2 L0,20 L-5,-2 Z" fill="url(#orangeGrad)"></path>
      <path d="M-4,-9 L0,-5 L4,-9 L0,-12 Z" fill="#FF8A00"></path>
    </g>
  </g>

  <!-- TEXT -->
  <g transform="translate(88,45)">
    <!-- 7Js -->
    <text x="0" y="0" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800" fill="url(#blueGrad)" letter-spacing="0.5">
      7Js
    </text>

    <!-- HRIS -->
    <text x="88" y="0" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800" fill="#FF7A18" letter-spacing="1">
      HRIS
    </text>
  </g>
</svg>